"$schema" = 'https://starship.rs/config-schema.json'

# Use the custom palette defined at the bottom
palette = "wal"

format = """
[ŅéČ](surface0)\
$os\
$username\
[Ņé░](bg:peach fg:surface0)\
$directory\
[Ņé░](fg:peach bg:green)\
$git_branch\
$git_status\
[Ņé░](fg:green bg:teal)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé░](fg:teal bg:blue)\
$docker_context\
[Ņé░](fg:blue bg:purple)\
$time\
[Ņé┤ ](fg:purple)\
$line_break$character"""

# This block maps your specific names (peach, teal, etc.)
# to the colors Pywal generates from your wallpaper.
[palettes.wal]
surface0 = "{color8}"     # Used for the first bubble background
peach    = "{color11}"    # Used for Directory
green    = "{color2}"     # Used for Git
teal     = "{color6}"     # Used for Languages
blue     = "{color4}"     # Used for Docker
purple   = "{color5}"     # Used for Time
red      = "{color1}"
lavender = "{color7}"
text     = "{foreground}"
base     = "{background}"
mantle   = "{background}"
color_bg3= "{color8}"     # Fallback for docker context

[os]
disabled = false
style = "bg:surface0 fg:text"

[os.symbols]
Windows = "¾░Ź▓"
Ubuntu = "¾░Ģł"
SUSE = "’īö"
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "Ņś¤"
Manjaro = "’īÆ"
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = "’īĆ"
Amazon = "’ē░"
Android = "Ņ£Ä"
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = "’īä"
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[username]
show_always = true
style_user = "bg:surface0 fg:text"
style_root = "bg:surface0 fg:text"
format = '[ $user ]($style)'

[directory]
style = "fg:text bg:peach"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ŌĆ”/"

[directory.substitutions]
"Documents" = "¾░łÖ "
"Downloads" = "’ĆÖ "
"Music" = "¾░ØÜ "
"Pictures" = "’ĆŠ "
"Developer" = "¾░▓ŗ "

[git_branch]
symbol = "’Éś"
style = "bg:teal"
format = '[[ $symbol $branch ](fg:text bg:green)]($style)'

[git_status]
style = "bg:teal"
format = '[[($all_status$ahead_behind )](fg:text bg:green)]($style)'

[nodejs]
symbol = "Ņ£ś"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:text bg:teal)]($style)'

[c]
symbol = "Ņś× "
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:text bg:teal)]($style)'

[rust]
symbol = "Ņ×©"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:text bg:teal)]($style)'

[golang]
symbol = "Ņś¦"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:text bg:teal)]($style)'

[php]
symbol = "Ņśł"
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:text bg:teal)]($style)'

[java]
symbol = "Ņē¢ "
style = "bg:teal"
format = '[[ $symbol( $version) ](fg:text bg:teal)]($style)'

[kotlin]
