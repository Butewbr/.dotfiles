source = ~/.cache/wal/colors-hyprland.conf

# ALIASES (Mapping Pywal colors to readable names)
$accent = $color9
$text = $foreground
$base = $background
$surface = $color0
$error = $color1
$warning = $color3

$font = MaruBuri, JetBrainsMono Nerd Font

# GENERAL
general {
    disable_loading_bar = true
    hide_cursor = true
    no_fade_in = false
    grace = 0
}

# BACKGROUND
background {
    monitor =
    # Use 'screenshot' to blur your current screen, or a specific path
    path = screenshot
    # path = /path/to/your/wallpaper.png
    
    blur_passes = 2
    blur_size = 5
    color = $base
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# TIME
label {
    monitor =
    text = cmd[update:30000] echo "$(date +"%p %I:%M")"
    color = $text
    font_size = 76
    font_family = $font
    position = -30, 0
    halign = right
    valign = top
}

# DATE (Korean Format)
label {
    monitor = 
    text = cmd[update:43200000] echo "$(date +"%Y년 %B %d일 %A")"
    color = $text
    font_size = 25
    font_family = $font
    position = -30, -150
    halign = right
    valign = top
}

# USER AVATAR
image {
    monitor = 
    path = ~/.face
    size = 100
    border_color = $accent
    border_size = 2
    position = 0, 75
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    
    # Colors
    outer_color = $accent
    inner_color = $surface
    font_color = $text
    check_color = $accent
    fail_color = $error
    capslock_color = $warning

    fade_on_empty = false
    
    # Fixed Placeholder (Removed invalid ##alpha codes)
    placeholder_text = <i>󰌾 로그인됨: <b>$USER</b></i>
    
    hide_input = false
    
    fail_text = <i>인증 실패 <b>($ATTEMPTS)</b></i>
    
    position = 0, -35
    halign = center
    valign = center
}