# Setup monitors
# See https://wiki.hyprland.org/Configuring/Monitors/
# monitor=,preferred,auto,auto

env = WLR_NO_HARDWARE_CURSORS,1
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = HYPRSHOT_DIR,$HOME/사진/Screenshots
env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1
env = GBM_BACKEND,nvidia-drm
env = __GL_VRR_ALLOWED,0
env = NVD_BACKEND,direct
env = XDG_SESSION_TYPE,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

env = XCURSOR_THEME,Fluent
env = XCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Fluent
env = HYPRCURSOR_SIZE,24

source = ~/.cache/wal/colors-hyprland.conf

exec-once = hyprctl setcursor Fluent 24

monitor=eDP-1, 1920x1080@60, 0x0, 1
monitor=HDMI-A-3,2560x1080@75, auto, 1
monitor=desc:Acer Technologies KG241Q P 0x9263FF27,1920x1080@144,0x-1080,1
monitor=desc:LG Electronics LG TV,1920x1080@60,0x-1080,1

# See https://wiki.hyprland.org/Configuring/Keywords/ for more

# Execute your favorite apps at launch
exec-once = $HOME/.config/hypr/xdg-portal-hyprland
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = fcitx5 -d
exec-once = killall -q dunst mako
exec-once = swaync
exec-once = LC_TIME=ko_KR.UTF-8 swaync
exec-once = kitty
exec-once = hyprpolkitagent
exec-once = ulauncher
exec-once = wl-paste --type text --watch cliphist store # Stores only text data
exec-once = wl-paste --type image --watch cliphist store # Stores only image data
exec-once = bash -c "sleep 1 && unset GDK_BACKEND && waybar"
exec-once = bash -c "sleep 2 && $HOME/.config/hypr/scripts/waybar_autohide.sh"
exec-once = bash -c "sleep 1 && teams-for-linux"
exec-once = bash -c "sleep 1 && telegram-desktop"
exec-once = wl-paste -p --watch wl-copy -p ''
exec-once = dotoold
exec-once = swww-daemon

$menu=ulauncher-toggle

# Source a file (multi-file configs)
# source = $HOME/.config/hypr/myColors.conf

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_model =
    #kb_options = grp:alt_toggle
    kb_rules =

    follow_mouse = 2
    force_no_accel = 1
    float_switch_override_focus = 0

    touchpad {
        natural_scroll = yes
    }

    sensitivity = 0.25 # -1.0 - 1.0, 0 means no modification.
}

cursor {
    no_hardware_cursors = true
    use_cpu_buffer = 2
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 4
    gaps_out = 8
    border_size = 2
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = $color11
    col.inactive_border = $color1

    layout = dwindle

    no_focus_fallback = true
}

misc {
    vfr = true
    disable_hyprland_logo = yes
    middle_click_paste = false
    session_lock_xray = 1
}

xwayland {
    force_zero_scaling = true
}

# debug {
#     disable_logs = false
#     enable_stdout_logs = false
# }

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 8
    
    blur { 
        enabled = true
        size = 7
        passes = 3
    }

#    drop_shadow = yes
#    shadow_range = 4
#    shadow_render_power = 3
#    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

plugin {
    hyprspace {
        # How much the overview scales down (0.0 - 1.0)
        overview_fallback_scale = 1.0
        
        # Color of the background behind windows (RGBA)
        panel_color = rgba(00000055) 
        
        # Blur the background?
        panel_blur = true
        
        # Exit the overview when you click a window?
        click_in_cursor = true
        
        # Action to perform when clicking the background (usually close overview)
        on_click_release = true
        
        # Gesture settings (if using a touchpad)
        # gesture_distance = 300
    }
}

#master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
 #   new_is_master = true
#}

# 4-finger swipe up/down for volume
# bindd = , edge:r:u, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ # Swipe up from edge

layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0, match:namespace wofi
layerrule = xray on, match:namespace wofi

layerrule = blur on, match:namespace ulauncher

layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0, match:namespace swaync-control-center

layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0, match:namespace swaync-notification-window

layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = xray on, match:namespace waybar

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more

# Example windowrule v1
# windowrule = pseudo,class:^(kitty)$
windowrule = match:class ^(org\.telegram\.desktop)$, float true
windowrule = match:class ^(teams-for-linux)$, float true
windowrule = match:class ^(spotify|Spotify)$, float true
windowrule = match:title ^(화면 속 화면)$, float true
windowrule = match:class ^(nm-connection-editor)$, float true
windowrule = match:class ^(iriunwebcam)$, float true
windowrule = match:class ^(MultiViewer)$, float true
windowrule = match:class ^(org\.pulseaudio\.pavucontrol)$, float true
windowrule = match:class ^(Ulauncher Preferences)$, float true
windowrule = match:class ^(discord)$, float true
windowrule = match:title ^(satty)$, float true
windowrule = match:class ^(scrcpy)$, float true
# Float zen dev tools
windowrule = match:class zen, match:initial_title ^$, float true
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# rules below would make the specific app transparent
windowrule = match:class ^(kitty)$, opacity 0.95 0.8
windowrule = match:class ^(Thunar)$, opacity 1 0.8
windowrule = match:class ^(chromium-browser)$, opacity 1 0.8
windowrule = match:class ^(code|Code|code-oss)$, opacity 0.95 0.8
windowrule = match:class ^(org\.telegram\.desktop)$, opacity 0.9 0.8
windowrule = match:class ^(wofi)$, opacity 0.9
windowrule = match:class ^(org\.telegram\.desktop)$, center true
windowrule = match:class ^(org\.telegram\.desktop)$, size 1440 960
windowrule = match:class ^(teams-for-linux)$, opacity 1 0.8
windowrule = match:class ^(teams-for-linux)$, center true
windowrule = match:class ^(teams-for-linux)$, size 1440 960
windowrule = match:class ^(spotify|Spotify|Spotify Premium)$, opacity 0.8 0.7
windowrule = match:class ^(spotify|Spotify|Spotify Premium)$, center true
windowrule = match:class ^(spotify|Spotify|Spotify Premium)$, size 1440 960
windowrule = match:class ^(discord)$, opacity 0.9 0.8
windowrule = match:class ^(discord)$, center true
windowrule = match:class ^(discord)$, size 1440 960
windowrule = match:class ^(zen)$, opacity 1 0.95
windowrule = match:class ^(nm-connection-editor)$, opacity 0.8 0.7
windowrule = match:namespace ^(swaync-notification-window)$, opacity 0.9 0.8
windowrule = match:namespace ^(swaync-control-center)$, opacity 0.9 0.8
# Zen dev tools size
windowrule = match:class zen, match:initial_title ^$, size 960 640

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Browser (Zen)
bind = $mainMod, 1, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh zen /home/butew/.local/opt/zen/zen

# Terminal (Hyper)
# bind = $mainMod, 4, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh Hyper hyper

# Terminal (kitty)
bind = $mainMod, 2, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh kitty kitty

# File Manager (Thunar)
bind = $mainMod, E, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh thunar thunar

# VSCode (Code)
bind = $mainMod, 3, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh code code

# Telegram Desktop
bind = $mainMod, 4, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh org.telegram.desktop telegram-desktop

# Teams
bind = $mainMod, 5, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh teams-for-linux teams-for-linux

# Teams
bind = $mainMod, a, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh anki anki

# Spotify
bind = $mainMod, XF86AudioPlay, exec, $HOME/.config/hypr/scripts/launch_or_focus.sh spotify spotify-launcher

# This will toggle Waybar visibility when you press and release the Super key
bind = SUPER, Super_L, exec, pkill -SIGUSR1 waybar

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, kitty -e zsh  #open the terminal
bind = ALT, F4, killactive, # close the active window
bind = $mainMod, W, killactive, # close the active window
bind = $mainMod, L, exec, hyprlock # Lock the screen
bind = $mainMod, M, exec, wlogout --protocol layer-shell # show the logout window
# bind = $mainMod SHIFT, M, exit, # Exit Hyprland all together no (force quit Hyprland)
bind = $mainMod, F, togglefloating, # Allow a window to float
bind = ALT, SPACE, exec, $menu # Show the graphicall app launcher
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, D, exec, $HOME/.config/hypr/scripts/show_desktop.sh

bind = SHIFT $mainMod, C, exec, $HOME/.config/hypr/scripts/colorpicker.sh

bind = $mainMod, period, exec, $HOME/.config/hypr/scripts/emoji_picker.sh

# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move window with mainMod + Shift + arrow keys
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, togglesplit # splits vertically
bind = $mainMod SHIFT, down, togglesplit # splits vertically

# Switch workspaces with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, workspace, 1
bind = $mainMod SHIFT, 2, workspace, 2
bind = $mainMod SHIFT, 3, workspace, 3
bind = $mainMod SHIFT, 4, workspace, 4
bind = $mainMod SHIFT, 5, workspace, 5
bind = $mainMod SHIFT, 6, workspace, 6
bind = $mainMod SHIFT, 7, workspace, 7
bind = $mainMod SHIFT, 8, workspace, 8
bind = $mainMod SHIFT, 9, workspace, 9
bind = $mainMod SHIFT, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod CTRL, 1, movetoworkspace, 1
bind = $mainMod CTRL, 2, movetoworkspace, 2
bind = $mainMod CTRL, 3, movetoworkspace, 3
bind = $mainMod CTRL, 4, movetoworkspace, 4
bind = $mainMod CTRL, 5, movetoworkspace, 5
bind = $mainMod CTRL, 6, movetoworkspace, 6
bind = $mainMod CTRL, 7, movetoworkspace, 7
bind = $mainMod CTRL, 8, movetoworkspace, 8
bind = $mainMod CTRL, 9, movetoworkspace, 9
bind = $mainMod CTRL, 0, movetoworkspace, 10

# Clipboard
bind = $mainMod, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy

# Scroll through existing workspaces with mainMod + scroll
# bind = $mainMod, mouse_down, workspace, e+1
# bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow 

# Screenshots
bind = CTRL SHIFT, S, exec, hyprshot -z -m region --raw | tee >(wl-copy) | satty --filename -
bind = CTRL ALT, S, exec, hyprshot -z -m window --raw | tee >(wl-copy) | satty --filename -
bind = ,PRINT, exec, hyprshot -m output --clipboard-only

# Media binds
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

binde = $mainMod, XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
binde = $mainMod, XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle

binde = , XF86AudioRaiseVolume, exec, echo wheel 1.25 | dotoolc
binde = , XF86AudioLowerVolume, exec, echo wheel -1.25 | dotoolc

# Super + Scroll to change volume
binde = $mainMod, mouse_up, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
binde = $mainMod, mouse_down, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%

bind = $mainMod, enter, exec, echo click 1 | dotoolc

bind = ALT, Tab, cyclenext
bind = ALT, Tab, bringactivetotop  # Bring it to the top
bind = Alt Shift, Tab, cyclenext, prev
bind = ALT SHIFT, Tab, bringactivetotop  # Bring it to the top

bind = , XF86MonBrightnessUp, exec, brightnessctl -q -d intel_backlight s +5%

bind = , XF86MonBrightnessDown, exec, brightnessctl -q -d intel_backlight s 5%-

bind = ALT SHIFT, 1, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1920 1080 && hyprctl dispatch centerwindow
bind = ALT SHIFT, 2, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1440 960 && hyprctl dispatch centerwindow
bind = ALT SHIFT, 3, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 1280 720 && hyprctl dispatch centerwindow
bind = ALT SHIFT, 4, exec, hyprctl dispatch setfloating && hyprctl dispatch resizeactive exact 960 640 && hyprctl dispatch centerwindow

# bind = SUPER, Tab, overview:toggle

gesture = 4, horizontal, workspace

gesture = 3, up, float, float
gesture = 3, down, float, tile
gesture = 3, up, mod: SUPER, fullscreen
gesture = 3, swipe, move

gesture = 2, pinch, mod: SUPER, resize

# gesture = 4, up, xdotool key XF86AudioRaiseVolume
# gesture = 4, down, xdotool key XF86AudioLowerVolume

bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/theme_switcher.sh